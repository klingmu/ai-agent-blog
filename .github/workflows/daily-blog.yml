name: 🤖 Daily AI Agent Blog

on:
  schedule:
    # 毎朝 6:00 JST (UTC 21:00 前日)
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（記事生成のみ・投稿しない）"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40   # エージェントループ分を考慮して延長

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 1. 情報収集（arXiv / RSS / HN / GitHub / YouTube）──
      - name: 📥 Collect
        run: python scripts/collect.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      # ── 2. エージェント記事生成 ────────────────────────────
      - name: ✍️ Generate (Agentic)
        id: generate
        run: python scripts/generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      # ── 3. アーティファクト保存 ───────────────────────────
      - name: 📦 Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blog-${{ github.run_id }}
          path: |
            articles/
            data/
          retention-days: 30

      # ── 4. 投稿（承認済みのみ）─────────────────────────────
      - name: 🚀 Publish
        if: steps.generate.outcome == 'success' && inputs.dry_run != true
        run: python scripts/publish.py
        env:
          PUBLISH_TARGET: ${{ vars.PUBLISH_TARGET || 'zenn' }}
          GIT_USER_NAME: "AI Blog Bot"
          GIT_USER_EMAIL: "bot@example.com"
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ── 5. データ保存コミット ─────────────────────────────
      - name: 💾 Commit data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "AI Blog Bot"
          git config user.email "bot@example.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add data/ articles/
          git diff --staged --quiet || git commit -m "📊 $(date +%Y-%m-%d) data"
          git push origin main || true

      # ── 6. 失敗通知 ───────────────────────────────────────
      - name: ❌ Notify failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"❌ AI Blog 失敗: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
